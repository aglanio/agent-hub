<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Agent Hub</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-logo"><span>Agent Hub</span></div>
  <div style="font-size:.75rem;color:var(--text3)">Agentes Pessoais de IA</div>
  <div class="topbar-sep"></div>
  <div style="display:flex;align-items:center;gap:6px;font-size:.75rem;color:var(--text2)">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Carregando...</span>
  </div>
  <button class="topbar-btn" onclick="loadFlow()">&#x21ba; Atualizar</button>
</div>

<!-- LAYOUT -->
<div class="layout">
  <div class="canvas-section">
    <div class="canvas-dots"></div>
    <div class="canvas-wrap">
      <div class="canvas-inner" id="canvasInner">
        <svg class="edges-svg" id="edgesSvg"></svg>
        <div id="nodesLayer"></div>
      </div>
    </div>
  </div>

  <!-- SIDE PANEL -->
  <div class="side-panel" id="sidePanel">
    <div class="panel-head">
      <div class="panel-agent-icon" id="panelIcon" style="background:#1a1a30"></div>
      <div>
        <div class="panel-title" id="panelTitle">Agente</div>
        <div style="font-size:.72rem;color:var(--text3)" id="panelSub"></div>
      </div>
      <button class="panel-close" onclick="closePanel()">&#x2715;</button>
    </div>
    <div class="panel-tabs">
      <button class="ptab active" onclick="switchTab('chat',this)">Chat</button>
      <button class="ptab" onclick="switchTab('report',this)">Relat&oacute;rio</button>
      <button class="ptab" onclick="switchTab('skill',this)">Skill</button>
    </div>
    <div class="panel-content">
      <div class="tab-pane active" id="tabChat">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-wrap">
          <textarea class="chat-input" id="chatInput" placeholder="Pergunte ao agente..." rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendChat()">&#x27A4;</button>
        </div>
      </div>
      <div class="tab-pane" id="tabReport"></div>
      <div class="tab-pane" id="tabSkill">
        <pre class="skill-pre" id="skillPre">Carregando...</pre>
      </div>
    </div>
  </div>
</div>

<!-- Scripts (ordem importa: api -> canvas -> panel -> app) -->
<script src="js/api.js"></script>
<script src="js/canvas.js"></script>
<script src="js/panel.js"></script>
<script src="js/app.js"></script>
</body>
</html>
